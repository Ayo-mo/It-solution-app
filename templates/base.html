<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IT Solution App{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="container navbar">
            <a class="brand" href="{{ url_for('home') }}">IT Solution</a>
            <nav class="nav-links">
                <a href="{{ url_for('home') }}" class="{% if request.path == '/' %}active{% endif %}">Home</a>
                <a href="{{ url_for('about') }}" class="{% if request.path == '/about' %}active{% endif %}">About</a>
                <a href="{{ url_for('services') }}" class="{% if request.path == '/services' %}active{% endif %}">Services</a>
                <a href="{{ url_for('contact') }}" class="{% if request.path == '/contact' %}active{% endif %}">Contact</a>
            </nav>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer>
        <div class="container">
            <p>Delivering trusted software and digital services for growing businesses.</p>
        </div>
    </footer>
</body>
</html>

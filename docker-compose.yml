services:
  nginx:
    build: ./nginx
    container_name: nginx-proxy

    ports:
      - "80:80"

    depends_on:
      - web

    restart: unless-stopped

  web:
    image: ayodeji2309/it-solution-app:latest
    container_name: it-solution-container

    env_file:
      - .env

    expose:
      - "5000"

    restart: unless-stopped

    depends_on:
      - db

  db:
    image: postgres:16
    container_name: postgres-db

    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: